<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISAL N - Portfolio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: #1a1a1a;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding-top: 50px;
    }
    .profile-pic {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #ff416c;
        margin-bottom: 20px;
        transition: transform 0.3s;
    }
    .profile-pic:hover {
        transform: scale(1.05);
    }
    h1 {
        font-size: 3em;
        margin-bottom: 20px;
    }
    .social-links {
        display: flex;
        gap: 25px;
        margin-bottom: 40px;
    }
    .social-links a {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #2c2c2c;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #fff;
        text-decoration: none;
        transition: transform 0.3s, background 0.3s;
    }
    .social-links a:hover {
        transform: scale(1.2);
        background: #ff416c;
    }
    .work-list {
        display: flex;
        flex-direction: column;
        gap: 25px;
        text-align: left;
        width: 90%;
        max-width: 600px;
    }
    .work-item {
        display: flex;
        align-items: center;
        font-size: 1.5em;
        gap: 15px;
        padding: 15px 25px;
        border-radius: 12px;
        background: #2c2c2c;
        transition: transform 0.3s, background 0.3s, color 0.3s;
        cursor: default;
    }
    .work-item i {
        font-size: 2em;
        color: #ff416c;
        min-width: 40px;
        text-align: center;
    }
    .work-item:hover {
        transform: translateX(10px);
        background: #ff416c;
        color: #fff;
    }
    @media(max-width:600px){
        h1 { font-size: 2em; }
        .work-item { font-size: 1.2em; padding: 12px 20px; }
        .work-item i { font-size: 1.5em; min-width: 35px; }
        .social-links a { width: 50px; height: 50px; font-size: 24px; }
        .profile-pic { width: 150px; height: 150px; }
    }
</style>
</head>
<body>

<img src="https://i.postimg.cc/j5svvwqX/1774067296198.png" alt="RISAL N" class="profile-pic">

    <a href="https://github.com/NOVA-VCRP" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
</div>

    <div class="work-item"><i class="fas fa-coins"></i> CRYPTO EXCHANGE</div>
    <div class="work-item"><i class="fab fa-python"></i> PYTHON & DISCORD BOTS</div>
    <div class="work-item"><i class="fas fa-store"></i> MYSELLAUTH STORE</div>
    <div class="work-item"><i class="fas fa-city"></i> NEXUS' CITY ROLE PLAY</div>
    <div class="work-item"><i class="fas fa-crosshairs"></i> NEXUS' PVP [NPVP]</div>
    <div class="work-item"><i class="fas fa-credit-card"></i> RTC & PAYMENTS</div>

    <div class="work-item"><i class="fas fa-database"></i> MYSQL DEVELOPMENT</div>
</div>
